[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hr-system"
version = "1.0.0"
description = "Production-ready HR System API with AI-powered resume screening"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "sqlalchemy[asyncio]==2.0.36",
    "asyncpg==0.30.0",
    "alembic==1.14.1",
    "pydantic[email]==2.10.4",
    "pydantic-settings==2.7.1",
    "bcrypt==4.2.1",
    "PyJWT==2.10.1",
    "python-multipart==0.0.20",
    "pypdf>=3.17.0",
    "python-docx>=1.1.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "aiofiles>=23.2.0",
]

[project.optional-dependencies]
dev = [
    "ruff==0.8.6",
    "pytest==8.3.4",
    "pytest-asyncio==0.25.0",
    "httpx==0.28.1",
]

[tool.setuptools.packages.find]
include = ["hr_system*", "app*"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "hr_system", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
